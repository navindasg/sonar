# Per-tool permission overrides (ported from brook37 config/tool_permissions.yaml).
#
# Sonar collapses brook37's four tiers to two (see CONTRACTS.md §1):
#   local  = auto-run inside a voice turn (read-only / safe side effects)
#   gated  = human approval required (browser / mutation) — not reachable in a
#            synchronous voice turn until the approval seam lands.
#
# A tool absent from this file falls back to its class-declared `permission`.

rag.search: local
rag.note_context: local
todo_add: local
todo_done: local
todo_list: local
state_read: local
# External inputs (read-only). gmail/calendar read the user's own account via
# per-user OAuth; web.search is the one capability that leaves the machine. All
# read-only, so auto-run inside a voice turn. (Draft/send email will be `gated`.)
gmail.search: local
calendar.agenda: local
# calendar.create WRITES an event to the user's own calendar — kept local
# (low-consequence, reversible) so it works in a voice turn, unlike email send.
calendar.create: local
web.search: local
